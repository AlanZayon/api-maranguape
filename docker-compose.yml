version: '3.8'

services:
  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      # Mesmo DB até a migração multi-tenant separar usuários de fato
      - MONGO_CONNECTING_USUARIOS=mongodb://mongo:27017/funcionarios
      - MONGO_CONNECTING_FUNCIONARIOS=mongodb://mongo:27017/funcionarios
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - .:/app
    depends_on:
      - mongo
      - redis
    networks:
      - app-network
    # 1 instância em local — várias réplicas com 3000:3000 conflitam na porta
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '512M'

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '512M'

  redis:
    image: redis:latest
    ports:
      - '6379:6379'
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: '256M'

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - '8080:80'
    depends_on:
      - app
    networks:
      - app-network

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge
